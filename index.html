<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación de Presupuesto</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header class="cabecero">
        <div class="presupuesto">
            <div class="presupuesto_titulo">
                <span class="presupuesto_titulo--principal">Presupuesto Disponible</span>
                <span class="presupuesto_titulo--mes">Mayo de 2026</span>
            </div>
            <div class="presupuesto_valor" id="presupuesto">+ $0.00</div>
            <div class="presupuesto_resumen" id="presupuesto-resumen">Disponible: 0.00% de tus ingresos</div>

            <div class="presupuesto_ingreso limpiarEstilos">
                <div class="presupuesto_ingreso--texto">Ingresos</div>
                <div class="derecha">
                    <div class="presupuesto_ingreso--valor" id="ingresos">+ $0.00</div>
                </div>
            </div>

            <div class="presupuesto_egreso limpiarEstilos">
                <div class="presupuesto_egreso--texto">Egresos</div>
                <div class="derecha limpiarEstilos">
                    <div class="presupuesto_egreso--valor" id="egresos">- $0.00</div>
                    <div class="presupuesto_egreso--porcentaje" id="porcentaje">---</div>
                </div>
            </div>
        </div>
    </header>

    <form id="forma">
        <div class="agregar">
            <div class="agregar_contenedor">
                <label class="visualmente_oculto" for="tipo">Tipo de movimiento</label>
                <select class="agregar_tipo" id="tipo">
                    <option value="ingreso" selected>+</option>
                    <option value="egreso">-</option>
                </select>
                <label class="visualmente_oculto" for="descripcion">Descripción</label>
                <input type="text" class="agregar_descripcion" id="descripcion" placeholder="Agregar descripción">
                <label class="visualmente_oculto" for="valor">Valor</label>
                <input type="number" class="agregar_valor" id="valor" placeholder="Valor" step="any" min="0">
                <button type="submit" class="agregar_btn" id="btnAgregar" aria-label="Agregar movimiento">
                    <ion-icon name="checkmark-circle-outline"></ion-icon>
                </button>
                <button type="button" class="reiniciar_btn" id="btnReiniciar" aria-label="Restablecer datos">
                    Reiniciar
                </button>
            </div>
            <p class="formulario_mensaje" id="formulario-mensaje" aria-live="assertive"></p>
        </div>
    </form>

    <div class="contenedor limpiarEstilos">
        <div class="ingreso">
            <h2 class="ingreso_titulo">Ingresos</h2>
            <div id="lista-ingresos"></div>
        </div>

        <div class="egreso">
            <h2 class="egreso_titulo">Egresos</h2>
            <div id="lista-egresos"></div>
        </div>
    </div>

    <footer class="pie_pagina">
        <p class="pie_pagina--principal">© 2026 Aplicación de Presupuesto</p>
        <p class="pie_pagina--secundario">Desarrollado por Jorge L. Suárez</p>
    </footer>

    <script src="js/Dato.js"></script>
    <script src="js/Ingreso.js"></script>
    <script src="js/Egreso.js"></script>
    <script src="js/app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.esm.js"></script>
</body>
</html>
